<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStack - Teste de Conex??o | anywhere2opus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        input[type="url"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e4e8;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-test {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-test:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .result.loading {
            background: #e7f3ff;
            border: 2px solid #2196F3;
            color: #0c5aa0;
            text-align: center;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e1e4e8;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>???? CloudStack</h1>
            <p>Teste de Conex??o</p>
        </div>

        <div class="content">
            <form id="testForm">
                <div class="form-group">
                    <label for="apiUrl">URL da API CloudStack</label>
                    <input 
                        type="url" 
                        id="apiUrl" 
                        name="apiUrl"
                        placeholder="https://seu-cloudstack.com:8080/client/api"
                        required
                    >
                    <div class="hint">Exemplo: https://seu-cloudstack.com:8080/client/api</div>
                </div>

                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input 
                        type="password" 
                        id="apiKey" 
                        name="apiKey"
                        placeholder="Cole sua API Key"
                        required
                    >
                    <div class="hint">Sua chave de acesso do CloudStack</div>
                </div>

                <div class="form-group">
                    <label for="secretKey">Secret Key</label>
                    <input 
                        type="password" 
                        id="secretKey" 
                        name="secretKey"
                        placeholder="Cole sua Secret Key"
                        required
                    >
                    <div class="hint">Sua chave secreta do CloudStack</div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-test" id="testBtn">
                        ???? Testar Conex??o
                    </button>
                    <button type="reset">
                        ??????? Limpar
                    </button>
                </div>
            </form>

            <div id="result" class="result"></div>
        </div>

        <div class="footer">
            <p>anywhere2opus Cloud Migration API</p>
            <p style="margin-top: 8px; opacity: 0.7;">?? 2026 Opus Technology</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('testForm');
        const resultDiv = document.getElementById('result');
        const testBtn = document.getElementById('testBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const secretKey = document.getElementById('secretKey').value.trim();

            if (!apiUrl || !apiKey || !secretKey) {
                showResult('error', '??? Erro', 'Por favor, preencha todos os campos obrigat??rios.');
                return;
            }

            testBtn.disabled = true;
            testBtn.innerHTML = '??? Testando...';
            showLoadingState();

            try {
                const response = await fetch('/api/v1/configuration/cloudstack/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_url: apiUrl,
                        api_key: apiKey,
                        secret_key: secretKey
                    })
                });

                const data = await response.json();

                if (response.ok && data.connected) {
                    showResult('success', '??? Sucesso!', `Conectado! ${data.zones_found || 0} zonas encontradas.`);
                } else {
                    showResult('error', '??? Erro', data.error_message || 'Falha na conex??o.');
                }
            } catch (error) {
                showResult('error', '??? Erro', `Erro na requisi????o: ${error.message}`);
            }

            testBtn.disabled = false;
            testBtn.innerHTML = '???? Testar Conex??o';
        });

        function showLoadingState() {
            resultDiv.className = 'result loading show';
            resultDiv.innerHTML = '<div>??? Conectando ao CloudStack...</div>';
        }

        function showResult(type, title, message) {
            resultDiv.className = `result ${type} show`;
            resultDiv.innerHTML = `<div class="result-title">${title}</div><div>${message}</div>`;
        }
    </script>
</body>
</html>
